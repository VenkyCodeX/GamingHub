<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Gaming Rental Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo"><img src="assets/uploads/logo.jpeg" alt="logo" class="logo-img" />Gaming<span>Hub</span></div>
      <h2>Admin Login</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@gamingrentalhub.in" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn-primary-full" onclick="adminLogin()">Login</button>
      <div id="loginError" class="error-msg"></div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminDashboard" class="hidden">
    <div class="admin-navbar">
      <div class="nav-logo"><img src="assets/uploads/logo.jpeg" alt="logo" class="logo-img" />Gaming<span>Hub</span> Admin</div>
      <button onclick="adminLogout()" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-icon" style="background:#e8f5e9"><i class="fa-solid fa-indian-rupee-sign" style="color:#27ae60"></i></div><div><div class="stat-val" id="statRevenue">₹0</div><div class="stat-label">Revenue</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#e3f2fd"><i class="fa-solid fa-calendar-check" style="color:#1976d2"></i></div><div><div class="stat-val" id="statBookings">0</div><div class="stat-label">Bookings</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#f3e5f5"><i class="fa-solid fa-box" style="color:#7b1fa2"></i></div><div><div class="stat-val" id="statProducts">0</div><div class="stat-label">Products</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#fff3e0"><i class="fa-solid fa-clock" style="color:#f57c00"></i></div><div><div class="stat-val" id="statPending">0</div><div class="stat-label">Pending</div></div></div>
    </div>

    <!-- TABS -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab(this,'products')">Products</button>
      <button class="admin-tab" onclick="switchTab(this,'bookings')">Bookings</button>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="tab-products" class="tab-content">
      <div class="tab-header">
        <h3>Products</h3>
        <button class="btn-add" onclick="openProductModal()"><i class="fa-solid fa-plus"></i> Add Product</button>
      </div>
      <div id="adminProductsList"></div>
    </div>

    <!-- BOOKINGS TAB -->
    <div id="tab-bookings" class="tab-content hidden">
      <div class="tab-header"><h3>All Bookings</h3></div>
      <div id="adminBookingsList"></div>
    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay hidden" id="productModal">
    <div class="modal" style="max-height:90vh;overflow-y:auto">
      <h3 id="modalTitle">Add Product</h3>
      <input type="hidden" id="editProductId" />
      <div class="form-group"><label>Name</label><input type="text" id="pName" placeholder="Product name" /></div>
      <div class="form-group"><label>Category</label>
        <select id="pCategory">
          <option>PS5 Console</option><option>Xbox Console</option><option>VR</option>
          <option>Racing Wheel</option><option>PS5 Games</option><option>Projectors</option>
          <option>Speakers</option><option>Mics</option><option>Trekking Gear</option>
          <option>Riding Gear</option><option>Camping Gear</option><option>Trekking Shoes</option><option>Snow Boots</option>
        </select>
      </div>
      <div class="form-group"><label>Price (₹/day)</label><input type="number" id="pPrice" placeholder="100" /></div>
      <div class="form-group"><label>Description</label><textarea id="pDesc" rows="3" placeholder="Product description"></textarea></div>
      <div class="form-group"><label>Image URL</label><input type="text" id="pImage" placeholder="https://..." /></div>
      <div class="form-group"><label>Upload Image</label><input type="file" id="pImageFile" accept="image/*" /></div>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:10px">
        <input type="checkbox" id="pTrending" style="width:16px;height:16px;accent-color:#6c2bd9" />
        <label for="pTrending">Mark as Trending</label>
      </div>
      <div class="modal-actions">
        <button onclick="closeProductModal()">Cancel</button>
        <button class="btn-primary" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
